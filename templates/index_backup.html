<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cotizador</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: #f5f6f8;
      }

      .card-seccion {
        border-radius: 14px;
      }

      .titulo-seccion {
        font-weight: 700;
        margin-bottom: 1rem;
      }

      .total-box {
        font-size: 1.1rem;
        font-weight: 700;
      }

      .preview-doc {
        background: white;
        color: #000;
        padding: 40px;
        border: 1px solid #ddd;
        border-radius: 10px;
      }

      .preview-doc h2,
      .preview-doc h3,
      .preview-doc h4,
      .preview-doc p {
        margin-bottom: 0.6rem;
      }

      .preview-header {
        text-align: right;
        margin-bottom: 25px;
      }

      .preview-section-title {
        font-weight: 700;
        margin-top: 18px;
        margin-bottom: 8px;
      }

      .preview-table th,
      .preview-table td {
        border: 1px solid #000;
        padding: 8px;
        font-size: 0.95rem;
      }

      .preview-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
        margin-bottom: 16px;
      }

      .firma-preview {
        max-height: 110px;
        margin-top: 16px;
        display: block;
      }

      .bloque-contacto {
        margin-top: 24px;
        font-size: 0.95rem;
      }

      @media (max-width: 768px) {
        .preview-doc {
          padding: 20px;
        }

        .preview-table th,
        .preview-table td {
          font-size: 0.82rem;
          padding: 6px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container py-4">
      <div class="card shadow-sm card-seccion mb-4">
        <div class="card-body">
          <h1 class="h3 mb-4">Nueva Cotización</h1>

          <div class="row g-3">
            <div class="col-12">
              <label class="form-label"><strong>Fecha</strong></label>
              <input
                type="text"
                id="fecha"
                class="form-control"
                value="{{ fecha }}"
                readonly
              />
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label"><strong>No. de Ref.</strong></label>
              <input
                type="text"
                id="noReferencia"
                class="form-control"
                value="{{ no_referencia }}"
                readonly
              />
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label"
                ><strong>Validez de la oferta</strong></label
              >
              <input
                type="text"
                id="validez"
                class="form-control"
                value="{{ validez }}"
                readonly
              />
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label">Empresa</label>
              <select id="empresa" class="form-select" onchange="cargarIngenieros()">
                  <option value="">Seleccione</option>
                  {% for e in empresas %}
                      <option value="{{ e['id'] }}" {% if duplicado.empresa == e["nombre"] %}selected{% endif %}>
                          {{ e["nombre"] }}
                      </option>
                  {% endfor %}
              </select>
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label">Ingeniero</label>
              <select id="ingeniero" class="form-select">
                <option value="">Seleccione una empresa</option>
              </select>
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label">Su referencia</label>
              <input
                type="text"
                id="suReferencia"
                class="form-control"
                placeholder="Ingrese referencia del cliente"
              />
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label">Asunto</label>
              <input
                type="text"
                id="asunto"
                class="form-control"
                placeholder="Ingrese asunto"
              />
            </div>
          </div>

          <hr class="my-4" />

          <h2 class="h5 titulo-seccion">Datos automáticos</h2>

          <div class="row g-3">
            <div class="col-12 col-md-6">
              <label class="form-label">Precios</label>
              <input
                type="text"
                id="precioTexto"
                class="form-control"
                value="{{ datos_fijos.precio_texto }}"
                readonly
              />
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label">Tiempo de entrega</label>
              <input
                type="text"
                id="tiempoEntrega"
                class="form-control"
                value="{{ datos_fijos.tiempo_entrega }}"
                readonly
              />
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label">Encargado</label>
              <input
                type="text"
                id="encargado"
                class="form-control"
                value="{{ datos_fijos.encargado }}"
              />
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label">Cantidad de ítems</label>
              <div class="d-flex gap-2">
                <input
                  type="number"
                  id="cantidadItems"
                  class="form-control"
                  min="1"
                  placeholder="Ej. 3"
                />
                <button
                  type="button"
                  class="btn btn-primary"
                  onclick="generarTabla()"
                >
                  Generar
                </button>
              </div>
            </div>
          </div>

          <hr class="my-4" />

          <h2 class="h5 titulo-seccion">Detalle de la oferta</h2>
          <div id="tablaContainer"></div>

          <div class="row mt-3 g-3">
            <div class="col-12 col-lg-6 ms-lg-auto">
              <label class="form-label"
                ><strong>Total de la oferta</strong></label
              >
              <input
                type="text"
                id="totalOferta"
                class="form-control total-box"
                value="Q 0.00"
                readonly
              />
            </div>

            <div class="col-12">
              <label class="form-label"><strong>Total en letras</strong></label>
              <textarea id="totalLetras" class="form-control" rows="2" readonly>
CERO QUETZALES EXACTOS</textarea
              >
            </div>
          </div>

          <hr class="my-4" />

          <h2 class="h5 titulo-seccion">Contacto</h2>

          <div class="row g-3">
            <div class="col-12 col-md-4">
              <label class="form-label">Nombre</label>
              <input
                type="text"
                id="contactoNombre"
                class="form-control"
                value="{{ datos_fijos.contacto_nombre }}"
              />
            </div>

            <div class="col-12 col-md-4">
              <label class="form-label">Teléfono</label>
              <input
                type="text"
                id="contactoTelefono"
                class="form-control"
                value="{{ datos_fijos.contacto_telefono }}"
              />
            </div>

            <div class="col-12 col-md-4">
              <label class="form-label">Correo</label>
              <input
                type="email"
                id="contactoCorreo"
                class="form-control"
                value="{{ datos_fijos.contacto_correo }}"
              />
            </div>

            <div class="col-12">
              <label class="form-label">Firma (opcional)</label>
              <input
                type="file"
                id="firmaInput"
                class="form-control"
                accept="image/*"
              />
            </div>
          </div>

          <div class="mt-4 d-grid d-md-flex gap-2">
            <button
              type="button"
              class="btn btn-success"
              onclick="generarVistaPrevia()"
            >
              Vista previa
            </button>
          </div>
        </div>
      </div>

      <div class="card shadow-sm card-seccion">
        <div class="card-body">
          <h2 class="h4 mb-3">Vista previa de la cotización</h2>
          <div id="vistaPrevia" class="preview-doc">
            <p class="text-muted mb-0">
              Aquí aparecerá la cotización generada.
            </p>
          </div>
        </div>
      </div>
    </div>

    <script>
      let firmaBase64 = "";

      document
        .getElementById("firmaInput")
        .addEventListener("change", function (event) {
          const archivo = event.target.files[0];
          if (!archivo) {
            firmaBase64 = "";
            return;
          }

          const reader = new FileReader();
          reader.onload = function (e) {
            firmaBase64 = e.target.result;
          };
          reader.readAsDataURL(archivo);
        });
      async function cargarIngenieros() {
        const empresaId = document.getElementById("empresa").value;
        const ingenieroSelect = document.getElementById("ingeniero");
        const ingenieroDuplicado = "{{ duplicado.ingeniero }}";

        ingenieroSelect.innerHTML = "";

        if (!empresaId) {
            const option = document.createElement("option");
            option.text = "Seleccione una empresa";
            option.value = "";
            ingenieroSelect.appendChild(option);
            return;
        }

        const response = await fetch(`/api/ingenieros/${empresaId}`);
        const data = await response.json();

        if (!data.ingenieros.length) {
            const option = document.createElement("option");
            option.text = "No hay ingenieros";
            option.value = "";
            ingenieroSelect.appendChild(option);
            return;
        }

        data.ingenieros.forEach(ingeniero => {
            const option = document.createElement("option");
            option.value = ingeniero.nombre;
            option.text = ingeniero.nombre;

            if (ingeniero.nombre === ingenieroDuplicado) {
                option.selected = true;
            }

            ingenieroSelect.appendChild(option);
        });
      }  

      function generarTabla() {
        const cantidad = parseInt(
          document.getElementById("cantidadItems").value,
        );
        const container = document.getElementById("tablaContainer");

        if (!cantidad || cantidad < 1) {
          container.innerHTML = `<div class="alert alert-warning">Ingrese una cantidad válida de ítems.</div>`;
          return;
        }

        let html = `
                  <div class="table-responsive">
                      <table class="table table-bordered align-middle">
                          <thead class="table-light">
                              <tr>
                                  <th style="width: 8%;">No.</th>
                                  <th style="width: 12%;">Cantidad</th>
                                  <th>Descripción</th>
                                  <th style="width: 18%;">Precio Unitario</th>
                                  <th style="width: 18%;">Total</th>
                              </tr>
                          </thead>
                          <tbody>
              `;

        for (let i = 1; i <= cantidad; i++) {
          html += `
                      <tr>
                          <td>${i}</td>
                          <td>
                              <input type="number" class="form-control cantidad" min="0" value="1" oninput="calcularTotales()">
                          </td>
                          <td>
                              <input type="text" class="form-control descripcion" placeholder="Descripción del ítem">
                          </td>
                          <td>
                              <input type="number" class="form-control precio" min="0" step="1" value="0" oninput="calcularTotales()">
                          </td>
                          <td>
                              <input type="text" class="form-control subtotal" value="Q 0.00" readonly>
                          </td>
                      </tr>
                  `;
        }

        html += `
                          </tbody>
                      </table>
                  </div>
              `;

        container.innerHTML = html;
        calcularTotales();
      }

      function calcularTotales() {
        const cantidades = document.querySelectorAll(".cantidad");
        const precios = document.querySelectorAll(".precio");
        const subtotales = document.querySelectorAll(".subtotal");

        let totalGeneral = 0;

        for (let i = 0; i < cantidades.length; i++) {
          const cantidad = parseFloat(cantidades[i].value) || 0;
          const precio = parseFloat(precios[i].value) || 0;
          const subtotal = cantidad * precio;

          subtotales[i].value = "Q " + subtotal.toFixed(2);
          totalGeneral += subtotal;
        }

        document.getElementById("totalOferta").value =
          "Q " + totalGeneral.toFixed(2);
        document.getElementById("totalLetras").value =
          numeroALetras(totalGeneral);
      }

      function numeroALetras(numero) {
        const parteEntera = Math.round(numero);
        return convertirNumero(parteEntera) + " QUETZALES EXACTOS";
      }

      function convertirNumero(numero) {
        if (numero === 0) return "CERO";
        if (numero < 0) return "MENOS " + convertirNumero(Math.abs(numero));

        const unidades = [
          "",
          "UNO",
          "DOS",
          "TRES",
          "CUATRO",
          "CINCO",
          "SEIS",
          "SIETE",
          "OCHO",
          "NUEVE",
          "DIEZ",
          "ONCE",
          "DOCE",
          "TRECE",
          "CATORCE",
          "QUINCE",
          "DIECISÉIS",
          "DIECISIETE",
          "DIECIOCHO",
          "DIECINUEVE",
          "VEINTE",
        ];

        const decenas = [
          "",
          "",
          "VEINTE",
          "TREINTA",
          "CUARENTA",
          "CINCUENTA",
          "SESENTA",
          "SETENTA",
          "OCHENTA",
          "NOVENTA",
        ];

        const centenas = [
          "",
          "CIENTO",
          "DOSCIENTOS",
          "TRESCIENTOS",
          "CUATROCIENTOS",
          "QUINIENTOS",
          "SEISCIENTOS",
          "SETECIENTOS",
          "OCHOCIENTOS",
          "NOVECIENTOS",
        ];

        if (numero === 100) return "CIEN";
        if (numero <= 20) return unidades[numero];

        if (numero < 30) {
          if (numero === 21) return "VEINTIUNO";
          return "VEINTI" + convertirNumero(numero - 20);
        }

        if (numero < 100) {
          const d = Math.floor(numero / 10);
          const r = numero % 10;
          return decenas[d] + (r > 0 ? " Y " + convertirNumero(r) : "");
        }

        if (numero < 1000) {
          const c = Math.floor(numero / 100);
          const r = numero % 100;
          return centenas[c] + (r > 0 ? " " + convertirNumero(r) : "");
        }

        if (numero < 1000000) {
          const miles = Math.floor(numero / 1000);
          const r = numero % 1000;
          let textoMiles =
            miles === 1 ? "MIL" : convertirNumero(miles) + " MIL";
          return textoMiles + (r > 0 ? " " + convertirNumero(r) : "");
        }

        if (numero < 1000000000000) {
          const millones = Math.floor(numero / 1000000);
          const r = numero % 1000000;
          let textoMillones =
            millones === 1
              ? "UN MILLÓN"
              : convertirNumero(millones) + " MILLONES";
          return textoMillones + (r > 0 ? " " + convertirNumero(r) : "");
        }

        return "NÚMERO DEMASIADO GRANDE";
      }

      function obtenerNombreEmpresa() {
        const select = document.getElementById("empresa");
        return select.options[select.selectedIndex]?.text || "";
      }

      function generarVistaPrevia() {
        const fecha = document.getElementById("fecha").value;
        const noReferencia = document.getElementById("noReferencia").value;
        const validez = document.getElementById("validez").value;
        const empresa = obtenerNombreEmpresa();
        const ingeniero = document.getElementById("ingeniero").value;
        const suReferencia = document.getElementById("suReferencia").value;
        const asunto = document.getElementById("asunto").value;
        const precioTexto = document.getElementById("precioTexto").value;
        const tiempoEntrega = document.getElementById("tiempoEntrega").value;
        const encargado = document.getElementById("encargado").value;
        const totalOferta = document.getElementById("totalOferta").value;
        const totalLetras = document.getElementById("totalLetras").value;
        const contactoNombre = document.getElementById("contactoNombre").value;
        const contactoTelefono =
          document.getElementById("contactoTelefono").value;
        const contactoCorreo = document.getElementById("contactoCorreo").value;

        const cantidades = document.querySelectorAll(".cantidad");
        const descripciones = document.querySelectorAll(".descripcion");
        const precios = document.querySelectorAll(".precio");
        const subtotales = document.querySelectorAll(".subtotal");

        let filasHTML = "";

        for (let i = 0; i < cantidades.length; i++) {
          const cantidad = cantidades[i].value || "";
          const descripcion = descripciones[i].value || "";
          const precioUnitario = parseFloat(
            precios[i].value || 0,
          ).toLocaleString("en-US", {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2,
          });
          const subtotalNumero = (
            parseFloat(cantidades[i].value || 0) *
            parseFloat(precios[i].value || 0)
          ).toLocaleString("en-US", {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2,
          });

          filasHTML += `
        <tr style="height:90px;">
            <td style="border:1px solid #000; vertical-align:bottom; text-align:left; padding:4px;">${cantidad}</td>
            <td style="border:1px solid #000; vertical-align:top; padding:4px;">${descripcion}</td>
            <td style="border:1px solid #000; vertical-align:bottom; padding:0;">
                <table style="width:100%; border-collapse:collapse;">
                    <tr>
                        <td style="width:25%; border:none; text-align:center; vertical-align:bottom; padding:0 0 2px 0;">Q</td>
                        <td style="width:75%; border:none; text-align:right; vertical-align:bottom; padding:0 6px 2px 0;">${precioUnitario}</td>
                    </tr>
                </table>
            </td>
            <td style="border:1px solid #000; vertical-align:bottom; padding:0;">
                <table style="width:100%; border-collapse:collapse;">
                    <tr>
                        <td style="width:25%; border:none; text-align:center; vertical-align:bottom; padding:0 0 2px 0;">Q</td>
                        <td style="width:75%; border:none; text-align:right; vertical-align:bottom; padding:0 6px 2px 0;">${subtotalNumero}</td>
                    </tr>
                </table>
            </td>
        </tr>
    `;
        }

        // convertir fecha a "marzo de 2026"
        const fechaObj = new Date();
        const meses = [
          "enero",
          "febrero",
          "marzo",
          "abril",
          "mayo",
          "junio",
          "julio",
          "agosto",
          "septiembre",
          "octubre",
          "noviembre",
          "diciembre",
        ];
        const fechaCorta =
          meses[fechaObj.getMonth()] + " de " + fechaObj.getFullYear();

        const html = `
    <div style="font-family:'Times New Roman', Times, serif; font-size:14px;">

        <!-- encabezado -->
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <div>
                ${empresa || ""}<br>
                Ing. ${ingeniero || ""}<br>
                Presente.
            </div>
            <div style="text-align:right;">
                ${fecha}
            </div>
        </div>

        <p><strong>Attn.</strong></p>

        <!-- tabla superior -->
        <table style="width:100%; border-collapse:collapse; margin-bottom:15px;">
            <tr>
                <th style="border:1px solid #000; padding:5px;">SU REFERENCIA</th>
                <th style="border:1px solid #000; padding:5px;">NUESTRA REFERENCIA</th>
                <th style="border:1px solid #000; padding:5px;">GUATEMALA,</th>
            </tr>
            <tr>
                <td style="border:1px solid #000; padding:5px;">${suReferencia}</td>
                <td style="border:1px solid #000; padding:5px; text-align:center;">${noReferencia}</td>
                <td style="border:1px solid #000; padding:5px; text-align:center;">${fechaCorta}</td>
            </tr>
        </table>

        <!-- bloque info -->
        <table style="width:100%; margin-bottom:15px;">
            <tr>
                <td style="width:200px;"><strong>ASUNTO:</strong></td>
                <td><u>${asunto}</u></td>
            </tr>
            <tr>
                <td><strong>PRECIOS:</strong></td>
                <td>${precioTexto}</td>
            </tr>
            <tr>
                <td><strong>TIEMPO DE ENTREGA:</strong></td>
                <td>${tiempoEntrega}</td>
            </tr>
            <tr>
                <td><strong>VALIDEZ:</strong></td>
                <td>${validez}</td>
            </tr>
            <tr>
                <td><strong>ENCARGADO:</strong></td>
                <td>${encargado}</td>
            </tr>
        </table>

        <!-- titulo -->
        <div style="margin:10px 0;">
            ${asunto}
        </div>

        <!-- tabla principal -->
<table style="width:100%; border-collapse:collapse; margin-top:6px;">
    <thead>
        <tr>
            <th style="border:1px solid #000; padding:3px; text-align:center; width:12%;">CANTIDAD</th>
            <th style="border:1px solid #000; padding:3px; text-align:center; width:43%;">DESCRIPCION</th>
            <th style="border:1px solid #000; padding:3px; text-align:center; width:22%;">PRECIO UNIDAD</th>
            <th style="border:1px solid #000; padding:3px; text-align:center; width:23%;">PRECIO TOTAL</th>
        </tr>
    </thead>
    <tbody>
        ${filasHTML}
        <tr>
            <td style="border:none;"></td>
            <td style="border:none;"></td>
            <td style="border:1px solid #000; padding:0;">
                <table style="width:100%; border-collapse:collapse;">
                    <tr>
                        <td style="width:25%; border:none; text-align:center; padding:0;">TOTAL</td>
                        <td style="width:75%; border:none;"></td>
                    </tr>
                </table>
            </td>
            <td style="border:1px solid #000; padding:0;">
                <table style="width:100%; border-collapse:collapse;">
                    <tr>
                        <td style="width:25%; border:none; text-align:center; padding:0;">Q</td>
                        <td style="width:75%; border:none; text-align:right; padding:0 6px 0 0;">
                            ${parseFloat(
                              (
                                document.getElementById("totalOferta").value ||
                                "0"
                              )
                                .replace("Q", "")
                                .trim(),
                            ).toLocaleString("en-US", {
                              minimumFractionDigits: 2,
                              maximumFractionDigits: 2,
                            })}
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </tbody>
</table>

        <!-- totales -->
        <div style="margin-top:20px;">
            <p><strong>PRECIO DE ESTA OFERTA................ ${totalOferta}</strong></p>
            <p><strong>PRECIO EN LETRAS................ ${totalLetras}</strong></p>
        </div>

        <br>
        <p>Esperando poder servirles y agradeciendo su atención.</p>

        <p><strong>${contactoNombre}</strong></p>
        <p>Teléfono ${contactoTelefono}</p>
        <p>${contactoCorreo}</p>

    </div>
    `;

        document.getElementById("vistaPrevia").innerHTML = html;
      }
    </script>
  </body>
</html>
